{% extends "base.html" %}
{% block title %}Mapa de rutas{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
.hm-header {
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:12px; margin-bottom:16px;
}
.hm-title { font-size:1.1rem; font-weight:700; letter-spacing:-.02em; }
.hm-controls { display:flex; gap:8px; flex-wrap:wrap; }
.hm-select {
  height:30px; padding:0 10px; border:1px solid var(--border);
  border-radius:8px; font-family:var(--font-mono); font-size:12px;
  background:var(--surface); color:var(--text); cursor:pointer;
}
#hm-map {
  height: calc(100vh - 160px); min-height: 400px;
  border-radius:12px; overflow:hidden; border:1px solid var(--border);
  position:relative; z-index:0;
}
.hm-stats {
  display:flex; gap:16px; margin-top:10px; flex-wrap:wrap;
  font-family:var(--font-mono); font-size:11px; color:var(--muted);
}
.hm-stat b { color:var(--text); font-weight:600; }
.hm-loading {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  background:rgba(255,255,255,.9); padding:16px 24px; border-radius:10px;
  font-family:var(--font-mono); font-size:12px; z-index:500;
}
</style>
{% endblock %}

{% block content %}
<div class="hm-header">
  <h2 class="hm-title">Mapa de rutas</h2>
  <div class="hm-controls">
    <select class="hm-select" id="hm-period" onchange="loadHeatmap()">
      <option value="month">Último mes</option>
      <option value="3month">Últimos 3 meses</option>
      <option value="year">Último año</option>
      <option value="all" selected>Todo el historial</option>
    </select>
    <select class="hm-select" id="hm-type" onchange="loadHeatmap()">
      <option value="">Todos los tipos</option>
      <option value="Running">Carrera</option>
      <option value="Walking">Caminata</option>
      <option value="Cycling">Ciclismo</option>
      <option value="Hiking">Senderismo</option>
    </select>
  </div>
</div>

<div style="position:relative">
  <div id="hm-map"></div>
  <div class="hm-loading" id="hm-loading">Cargando rutas…</div>
</div>
<div class="hm-stats" id="hm-stats"></div>
{% endblock %}

{% block extra_js %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
let _map = null;
let _lines = [];

function initMap() {
  if (_map) return;
  _map = L.map('hm-map', {zoomControl:true}).setView([40.4, -3.7], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap', maxZoom:18
  }).addTo(_map);
}

async function loadHeatmap() {
  const period = document.getElementById('hm-period').value;
  const type   = document.getElementById('hm-type').value;
  const loading = document.getElementById('hm-loading');
  loading.style.display = 'block';

  // Limpiar líneas anteriores
  _lines.forEach(l => _map.removeLayer(l));
  _lines = [];

  try {
    const r    = await fetch(`/api/workouts/heatmap?period=${period}&type=${encodeURIComponent(type)}`);
    const data = await r.json();

    if (!data.routes || !data.routes.length) {
      loading.textContent = 'Sin rutas para este período';
      return;
    }

    // Contar cuántas rutas pasan por cada punto para calcular intensidad
    const allBounds = [];

    data.routes.forEach(route => {
      if (!route.points || route.points.length < 2) return;
      const latlngs = route.points.map(p => [p.lat, p.lon]);
      allBounds.push(...latlngs);

      // Color según tipo de actividad
      const colors = {
        'Running': '#ef4444', 'Walking': '#3b82f6',
        'Cycling': '#10b981', 'Hiking':  '#f59e0b',
      };
      const color = colors[route.type] || '#6366f1';

      const line = L.polyline(latlngs, {
        color, weight: 3, opacity: 0.45,
        smoothFactor: 2,
      }).addTo(_map);

      line.on('mouseover', function() {
        this.setStyle({opacity:0.9, weight:5});
        this.bindTooltip(
          `<b>${route.type||'Entrenamiento'}</b><br>${route.date} · ${route.km} km`,
          {sticky:true}
        ).openTooltip();
      });
      line.on('mouseout', function() {
        this.setStyle({opacity:0.45, weight:3});
        this.closeTooltip();
      });
      line.on('click', () => {
        if (route.idx !== undefined) window.location = `/workouts/${route.idx}`;
      });

      _lines.push(line);
    });

    // Ajustar vista a todas las rutas
    if (allBounds.length) {
      _map.fitBounds(L.latLngBounds(allBounds), {padding:[20,20]});
    }

    // Stats
    const stats = document.getElementById('hm-stats');
    const tipos = {};
    data.routes.forEach(r => { tipos[r.type||'Otro'] = (tipos[r.type||'Otro']||0)+1; });
    const tipoStr = Object.entries(tipos).map(([t,n])=>`${n} ${t}`).join(' · ');
    const totalKm = data.routes.reduce((s,r)=>s+(parseFloat(r.km)||0),0);
    stats.innerHTML = `
      <span><b>${data.routes.length}</b> rutas</span>
      <span><b>${totalKm.toFixed(1)}</b> km totales</span>
      <span>${tipoStr}</span>
    `;

    loading.style.display = 'none';
  } catch(e) {
    loading.textContent = 'Error cargando rutas';
    console.error(e);
  }
}

// Leyenda
function addLegend() {
  const legend = L.control({position:'bottomright'});
  legend.onAdd = () => {
    const div = L.DomUtil.create('div');
    div.style.cssText = 'background:white;padding:8px 12px;border-radius:8px;font-size:11px;font-family:monospace;line-height:1.8';
    div.innerHTML = `
      <div><span style="color:#ef4444">━━</span> Carrera</div>
      <div><span style="color:#3b82f6">━━</span> Caminata</div>
      <div><span style="color:#10b981">━━</span> Ciclismo</div>
      <div><span style="color:#f59e0b">━━</span> Senderismo</div>
      <div><span style="color:#6366f1">━━</span> Otros</div>
    `;
    return div;
  };
  legend.addTo(_map);
}

window.addEventListener('DOMContentLoaded', () => {
  initMap();
  addLegend();
  loadHeatmap();
});
</script>
{% endblock %}
